<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            color: white;
            position: relative;
        }
        .admin-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .admin-panel h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .admin-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 12px;
        }
        .btn-pause {
            background: #e74c3c;
            color: white;
        }
        .btn-pause:hover {
            background: #c0392b;
        }
        .btn-play {
            background: #27ae60;
            color: white;
        }
        .btn-play:hover {
            background: #219a52;
        }
        .btn-reset {
            background: #3498db;
            color: white;
        }
        .btn-reset:hover {
            background: #2980b9;
        }
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 500px;
            margin: 0 auto;
            color: #333;
        }
        h1 { margin-top: 0; color: #667eea; }
        .coins {
            font-size: 32px;
            font-weight: bold;
            margin: 20px 0;
            color: #f39c12;
        }
        .progress-container {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 15px;
            transition: width 0.1s linear;
        }
        .info {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 14px;
            color: #666;
        }
        .upgrade-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            width: 100%;
        }
        .upgrade-btn:hover:not(:disabled) {
            background: #219a52;
            transform: translateY(-2px);
        }
        .upgrade-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .stats {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Админ-панель -->
    <div class="admin-panel">
        <h3>Админ</h3>
        <button class="admin-btn btn-pause" id="pauseBtn" onclick="togglePause()">Пауза</button>
        <button class="admin-btn btn-reset" onclick="resetGame()">Сброс</button>
    </div>

    <div class="game-container">
        <h1>Idle Game</h1>
        
        <div class="coins">
            Монеты: <span id="coinCount">0</span>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="info">
            <span>Доход за цикл: <b id="incomePerCycle">1</b></span>
            <span>Прогресс: <span id="progressPercent">0</span>%</span>
        </div>
        
        <button class="upgrade-btn" id="upgradeBtn" onclick="buyUpgrade()">
            ⬆️ Улучшить (+1 монета) <br>
            <small>Цена: <span id="upgradeCost">5</span> монет</small>
        </button>
        
        <div class="stats">
            <div>Всего заработано: <b id="totalEarned">0</b></div>
            <div>Куплено улучшений: <b id="upgradesBought">0</b></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        // Игровые переменные
        let coins = 0;
        let incomePerCycle = 1;
        let upgradeCost = 5;
        let totalEarned = 0;
        let upgradesBought = 0;
        
        // Переменные прогресс-бара
        let progress = 0;
        const cycleDuration = 3000; // 3 секунды
        const updateInterval = 50; // Обновляем каждые 50мс
        let gameInterval; // ID интервала игры
        let isPaused = false; // Состояние паузы
        let lastSaveTime = Date.now(); // Время последнего сохранения
        
        // Элементы DOM
        const coinCountEl = document.getElementById('coinCount');
        const progressBarEl = document.getElementById('progressBar');
        const progressPercentEl = document.getElementById('progressPercent');
        const incomePerCycleEl = document.getElementById('incomePerCycle');
        const upgradeCostEl = document.getElementById('upgradeCost');
        const upgradeBtn = document.getElementById('upgradeBtn');
        const totalEarnedEl = document.getElementById('totalEarned');
        const upgradesBoughtEl = document.getElementById('upgradesBought');
        const pauseBtn = document.getElementById('pauseBtn');
        
        // Инициализация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBeaTgOjckAtryczMlfDqEji9NHF7uY8DI",
            authDomain: "torin-game.firebaseapp.com",
            databaseURL: "https://torin-game-default-rtdb.firebaseio.com",
            projectId: "torin-game",
            storageBucket: "torin-game.firebasestorage.app",
            messagingSenderId: "612353304943",
            appId: "1:612353304943:web:9491e30422e11b8a8a609a",
            measurementId: "G-R5T18G2022"
        };
        
        // Инициализируем Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const gameDataRef = db.ref('gameData');
        
        // Загрузка данных из Firebase при старте
        async function loadGameData() {
            try {
                const snapshot = await gameDataRef.once('value');
                const data = snapshot.val();
                
                if (data) {
                    coins = data.coins || 0;
                    incomePerCycle = data.incomePerCycle || 1;
                    upgradeCost = data.upgradeCost || 5;
                    totalEarned = data.totalEarned || 0;
                    upgradesBought = data.upgradesBought || 0;
                    progress = data.progress || 0;
                    isPaused = data.isPaused || false; // Загружаем состояние паузы
                    
                    // Обновляем кнопку паузы при загрузке
                    if (isPaused) {
                        pauseBtn.textContent = 'Запуск';
                        pauseBtn.className = 'admin-btn btn-play';
                    }
                    
                    // Рассчитываем монеты за время отсутствия
                    const now = Date.now();
                    const timeDiff = now - (data.lastSaveTime || now);
                    const cyclesPassed = Math.floor(timeDiff / cycleDuration);
                    
                    if (cyclesPassed > 0 && !isPaused) {
                        const earnedOffline = cyclesPassed * incomePerCycle;
                        coins += earnedOffline;
                        totalEarned += earnedOffline;
                        alert(`Добро пожаловать! Пока вас не было, вы заработали ${earnedOffline} монет!`);
                    }
                    
                    updateUI();
                    progressBarEl.style.width = progress + '%';
                    progressPercentEl.textContent = Math.floor(progress);
                }
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
            }
        }
        
        // Сохранение данных в Firebase
        function saveGameData() {
            gameDataRef.set({
                coins: coins,
                incomePerCycle: incomePerCycle,
                upgradeCost: upgradeCost,
                totalEarned: totalEarned,
                upgradesBought: upgradesBought,
                progress: progress,
                isPaused: isPaused,
                lastSaveTime: Date.now()
            }).catch(error => {
                console.error('Ошибка сохранения данных:', error);
            });
        }
        
        // Автосохранение каждые 10 секунд
        setInterval(saveGameData, 10000);
        
        // Сохранение при закрытии страницы
        window.addEventListener('beforeunload', saveGameData);
        
        // Основной игровой цикл
        function startGameLoop() {
            gameInterval = setInterval(() => {
                if (isPaused) return;
                
                // Увеличиваем прогресс
                progress += (updateInterval / cycleDuration) * 100;
                
                // Если прогресс заполнен
                if (progress >= 100) {
                    progress = 0;
                    coins += incomePerCycle;
                    totalEarned += incomePerCycle;
                    updateUI();
                }
                
                // Обновляем визуальную часть бара
                progressBarEl.style.width = progress + '%';
                progressPercentEl.textContent = Math.floor(progress);
                
            }, updateInterval);
        }
        
        // Загрузка данных и запуск игры
        loadGameData().then(() => {
            startGameLoop();
        });
        
        // Функция переключения паузы
        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                pauseBtn.textContent = 'Запуск';
                pauseBtn.className = 'admin-btn btn-play';
                saveGameData(); // Сохраняем при паузе
            } else {
                pauseBtn.textContent = 'Пауза';
                pauseBtn.className = 'admin-btn btn-pause';
                lastSaveTime = Date.now(); // Сбрасываем время при возобновлении
            }
        }
        
        // Функция сброса игры
        function resetGame() {
            coins = 0;
            incomePerCycle = 1;
            upgradeCost = 5;
            totalEarned = 0;
            upgradesBought = 0;
            progress = 0;
            updateUI();
            progressBarEl.style.width = '0%';
            progressPercentEl.textContent = '0';
            saveGameData(); // Сохраняем сброс в базу
        }
        
        // Покупка улучшения
        function buyUpgrade() {
            if (coins >= upgradeCost) {
                coins -= upgradeCost;
                incomePerCycle += 1;
                upgradeCost = Math.floor(upgradeCost * 1.5); // Цена растет на 50%
                upgradesBought++;
                updateUI();
                saveGameData(); // Сохраняем после покупки
            }
        }
        
        // Обновление интерфейса
        function updateUI() {
            coinCountEl.textContent = coins;
            incomePerCycleEl.textContent = incomePerCycle;
            upgradeCostEl.textContent = upgradeCost;
            totalEarnedEl.textContent = totalEarned;
            upgradesBoughtEl.textContent = upgradesBought;
            
            // Блокируем кнопку, если не хватает монет
            upgradeBtn.disabled = coins < upgradeCost;
        }
        
        // Инициализация
        updateUI();
    </script>
    
    <div style="position: fixed; bottom: 10px; right: 10px; font-size: 12px; color: rgba(255,255,255,0.7);">
        Версия: 0.0.4
    </div>
</body>
</html>
